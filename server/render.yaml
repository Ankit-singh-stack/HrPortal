# Root directory: Hr-mangemet-portal/render.yaml

services:
  # Backend API Service
  - type: web
    name: hr-portal-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://hr-portal-frontend.onrender.com

  # Frontend Static Site Service  
  - type: static
    name: hr-portal-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://hrportal-server-7hkl.onrender.com/api
      - key: NODE_VERSION
        value: 18.17.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
# Root directory: Hr-mangemet-portal/render.yaml

services:
  # Backend API + Frontend Service (Single Service)
  - type: web
    name: hr-portal-backend
    runtime: node
    rootDir: .
    buildCommand: "sh -c 'export VITE_API_URL=/api && cd client && npm install && npm run build && cd ../server && npm install'"
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://hrportal-server-7hkl.onrender.com